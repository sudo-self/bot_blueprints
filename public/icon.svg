<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38B0E3"/>
      <stop offset="50%" stop-color="#1E96C8"/>
      <stop offset="100%" stop-color="#0D6594"/>
    </linearGradient>

    <!-- Inner Glow for App Icon -->
    <radialGradient id="inner-glow" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Robot Head Gradient -->
    <linearGradient id="robot-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D1D9E6"/>
    </linearGradient>

    <!-- Robot Neck/Body Gradient -->
    <linearGradient id="neck-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F203B"/>
      <stop offset="100%" stop-color="#050A14"/>
    </linearGradient>

    <!-- Visor Gradient -->
    <linearGradient id="visor-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#112A46"/>
      <stop offset="45%" stop-color="#0B1A2E"/>
      <stop offset="45.1%" stop-color="#1A3A5F"/>
      <stop offset="100%" stop-color="#050D17"/>
    </linearGradient>

    <!-- Hologram Beam Gradient -->
    <linearGradient id="beam-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00FFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Paper Plane Gradients -->
    <linearGradient id="plane-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F4F8"/>
    </linearGradient>
    <linearGradient id="plane-right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E1E8ED"/>
      <stop offset="100%" stop-color="#CFD9E0"/>
    </linearGradient>
    <linearGradient id="plane-fold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9EB3C2"/>
      <stop offset="100%" stop-color="#8A9FAF"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="app-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.3"/>
    </filter>

    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#001A33" flood-opacity="0.4"/>
    </filter>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- App Icon Clip Path -->
    <clipPath id="app-clip">
      <rect x="24" y="24" width="464" height="464" rx="104"/>
    </clipPath>
  </defs>

  <!-- App Icon Base -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bg-grad)" filter="url(#app-shadow)"/>

  <!-- Clipped Inner Content -->
  <g clip-path="url(#app-clip)">
    
    <!-- Background Radial Grid -->
    <g stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.08">
      <circle cx="160" cy="280" r="80"/>
      <circle cx="160" cy="280" r="160"/>
      <circle cx="160" cy="280" r="240"/>
      <circle cx="160" cy="280" r="320"/>
      <circle cx="160" cy="280" r="400"/>
      <line x1="160" y1="280" x2="600" y2="280"/>
      <line x1="160" y1="280" x2="160" y2="-100"/>
      <line x1="160" y1="280" x2="471" y2="-31"/>
      <line x1="160" y1="280" x2="-151" y2="-31"/>
      <line x1="160" y1="280" x2="471" y2="591"/>
    </g>

    <!-- Floating Gear (Top Left) -->
    <g transform="translate(100, 100)" stroke="#FFFFFF" fill="none" opacity="0.15">
      <circle cx="0" cy="0" r="18" stroke-width="5"/>
      <circle cx="0" cy="0" r="25" stroke-width="6" stroke-dasharray="6 13.63"/>
    </g>

    <!-- Floating Code Brackets (Bottom Right) -->
    <g transform="translate(390, 390) scale(1.3)" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.15">
      <path d="M -18 -18 L -36 0 L -18 18 M 18 -18 L 36 0 L 18 18 M -8 24 L 8 -24"/>
    </g>

    <!-- Hologram Beam -->
    <polygon points="140,280 180,280 288,264 210,134" fill="url(#beam-grad)" style="mix-blend-mode: screen;"/>
    
    <!-- Hologram Rings -->
    <g stroke="#00FFFF" fill="none" style="mix-blend-mode: screen;">
      <ellipse cx="190" cy="230" rx="45" ry="12" stroke-width="2" opacity="0.6" transform="rotate(-25 190 230)"/>
      <ellipse cx="230" cy="180" rx="70" ry="18" stroke-width="1.5" opacity="0.3" transform="rotate(-25 230 180)"/>
    </g>

    <!-- Beam Particles -->
    <g fill="#00FFFF" filter="url(#glow)">
      <circle cx="180" cy="210" r="2.5"/>
      <circle cx="210" cy="160" r="3.5"/>
      <circle cx="240" cy="240" r="2"/>
      <circle cx="260" cy="190" r="3"/>
    </g>

    <!-- Robot Body / Neck -->
    <path d="M 120 380 L 200 380 L 240 512 L 80 512 Z" fill="url(#neck-grad)"/>
    <path d="M 130 400 L 190 400 L 220 512 L 100 512 Z" fill="url(#robot-grad)" filter="url(#drop-shadow)"/>
    
    <!-- Chest Plate Gear Emblem -->
    <g transform="translate(160, 460)" stroke="#B9CEDB" fill="none" opacity="0.6">
      <circle cx="0" cy="0" r="16" stroke-width="3"/>
      <circle cx="0" cy="0" r="22" stroke-width="4" stroke-dasharray="5 8.8"/>
    </g>

    <!-- Robot Head -->
    <g filter="url(#drop-shadow)">
      <!-- Base Head -->
      <rect x="90" y="280" width="140" height="130" rx="40" fill="url(#robot-grad)"/>
      
      <!-- Ears -->
      <rect x="75" y="320" width="20" height="50" rx="8" fill="#B9CEDB"/>
      <rect x="225" y="320" width="20" height="50" rx="8" fill="#B9CEDB"/>
      <circle cx="85" cy="345" r="4" fill="#00FFFF" filter="url(#glow)"/>
      <circle cx="235" cy="345" r="4" fill="#00FFFF" filter="url(#glow)"/>

      <!-- Visor -->
      <rect x="105" y="305" width="110" height="65" rx="25" fill="url(#visor-grad)"/>
      
      <!-- Glowing Eyes -->
      <ellipse cx="135" cy="340" rx="14" ry="18" fill="#00FFFF" filter="url(#glow)"/>
      <ellipse cx="185" cy="340" rx="14" ry="18" fill="#00FFFF" filter="url(#glow)"/>
      
      <!-- Eye Highlights -->
      <ellipse cx="135" cy="334" rx="5" ry="7" fill="#FFFFFF"/>
      <ellipse cx="185" cy="334" rx="5" ry="7" fill="#FFFFFF"/>

      <!-- Cheek Panel Lines -->
      <line x1="120" y1="385" x2="140" y2="385" stroke="#B9CEDB" stroke-width="3" stroke-linecap="round"/>
      <line x1="180" y1="385" x2="200" y2="385" stroke="#B9CEDB" stroke-width="3" stroke-linecap="round"/>

      <!-- Top Projector Slot -->
      <ellipse cx="160" cy="280" rx="40" ry="12" fill="#0A192F"/>
      <ellipse cx="160" cy="280" rx="30" ry="6" fill="#00FFFF" filter="url(#glow)"/>
    </g>

    <!-- Telegram Paper Plane -->
    <g filter="url(#drop-shadow)">
      <g transform="translate(340, 160) rotate(-10) scale(1.3)">
        <!-- Left Wing -->
        <polygon points="-100,-20 100,-100 -20,20" fill="url(#plane-left)"/>
        <!-- Right Wing -->
        <polygon points="100,-100 80,80 -20,20" fill="url(#plane-right)"/>
        <!-- Bottom Fold Shadow -->
        <polygon points="-20,20 -40,80 15,30" fill="url(#plane-fold)"/>
      </g>
    </g>

    <!-- Magic Sparkles -->
    <g fill="#00FFFF" filter="url(#glow)">
      <path d="M 0 -15 Q 0 0 15 0 Q 0 0 0 15 Q 0 0 -15 0 Q 0 0 0 -15 Z" transform="translate(280, 70) scale(0.8)"/>
      <path d="M 0 -15 Q 0 0 15 0 Q 0 0 0 15 Q 0 0 -15 0 Q 0 0 0 -15 Z" transform="translate(440, 200) scale(0.6)"/>
      <path d="M 0 -15 Q 0 0 15 0 Q 0 0 0 15 Q 0 0 -15 0 Q 0 0 0 -15 Z" transform="translate(220, 160) scale(0.5)"/>
      <path d="M 0 -15 Q 0 0 15 0 Q 0 0 0 15 Q 0 0 -15 0 Q 0 0 0 -15 Z" transform="translate(380, 280) scale(0.7)"/>
    </g>

  </g>

  <!-- App Icon Inner Glow & Border -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#inner-glow)" style="mix-blend-mode: overlay;" pointer-events="none"/>
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.25" pointer-events="none"/>

</svg>